name: Build Modulys Magic Lock APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'android/**'
      - '.github/workflows/android-debug-apk.yml'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build APK
        working-directory: android
        run: gradle --no-daemon --stacktrace --warning-mode all :app:assembleDebug

      - name: Rename APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/Modulys-Magic-Lock-v2.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Modulys-Magic-Lock-v2
          path: release/Modulys-Magic-Lock-v2.apk
